name: Release PR
on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

jobs:
  call-guard:
    uses: ./.github/workflows/guard.yml

  is_release_pr:
    needs: call-guard
    if: needs.call-guard.outputs.IS_RELEASE == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: echo "Running PR workflow for release/*"

  release_smoke_tests_pr:
    needs: is_release_pr
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: echo "Release PR Smoke Tests"

  release_system_tests_pr:
    needs: release_smoke_tests_pr
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: echo "Release PR System Tests"

  release_e2e_tests_pr:
    needs: release_system_tests_pr
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/workflows/actions/setup-selenium
      - uses: ./.github/workflows/actions/setup-node
      - uses: ./.github/workflows/actions/run-npm-cmd
        with:
          script: test:e2e:install:ci
      # - uses: nanasess/setup-chromedriver@v2
      # - run: chromedriver --version
      - uses: ./.github/workflows/actions/run-npm-cmd
        with:
          script: start
      - run: echo "Release E2E Tests"
      - uses: ./.github/workflows/actions/run-npm-cmd
        with:
          script: test:e2e:ci
      - uses: ./.github/workflows/actions/run-npm-cmd
        with:
          script: stop
