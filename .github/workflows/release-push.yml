name: Release
on:
  push:
    branches:
      - "release/*"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release_smoke_tests_push:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - run: echo "Release PUSH Smoke Tests"

  release_system_tests_push:
    needs: release_smoke_tests_push
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - run: echo "Release PUSH System Tests"

  release_e2e_tests_push:
    needs: release_smoke_tests_push
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - run: echo "Release PUSH E2E Tests"
