
name: Feature PR
on:
  pull_request:
    branches:
      - develop
    types: [opened, synchronize, reopened]

env:
  IS_FEATURE: ${{ startsWith(github.head_ref, 'feature/') }}

jobs:
  test_feature:
    if: env.IS_FEATURE == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "Running PR for feature/*"
