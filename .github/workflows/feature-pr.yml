name: Feature PR
on:
  pull_request:
    branches:
      - develop
    types: [opened, synchronize, reopened]

jobs:
  call-guard:
    uses: ./.github/workflows/guard.yml

  is_feature_pr:
    needs: call-guard
    if: needs.call-guard.outputs.IS_FEATURE == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: echo "Running PR workflow for feature/*"

  feature_linter_check_pr:
    needs: is_feature_pr
    uses: ./.github/workflows/lint.yml

  feature_unit_tests_pr:
    needs: feature_linter_check_pr
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/workflows/actions/setup-node
      - run: echo "Feature PR Unit Tests"
      - uses: ./.github/workflows/actions/run-npm-cmd
        with:
          script: test:unit

  feature_integration_tests_pr:
    needs: feature_unit_tests_pr
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/workflows/actions/setup-node
      - run: echo "Feature PR Integration Tests"
      - uses: ./.github/workflows/actions/run-npm-cmd
        with:
          script: start
      - uses: ./.github/workflows/actions/run-npm-cmd
        with:
          script: test:api
      - uses: ./.github/workflows/actions/run-npm-cmd
        with:
          script: stop
