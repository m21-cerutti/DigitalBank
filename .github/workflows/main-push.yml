name: Main
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  main_linter_check:
    uses: ./.github/workflows/lint.yml
    with:
      environment: main

  main_unit_tests:
    needs: main_linter_check
    runs-on: ubuntu-latest
    environment:
      name: main
      deployment: false
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/workflows/actions/setup-node
      - run: echo "Main Unit Tests"
      - uses: ./.github/workflows/actions/run-npm-cmd
        with:
          script: test:unit

  main_integration_tests:
    needs: main_unit_tests
    runs-on: ubuntu-latest
    environment:
      name: main
      deployment: false
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/workflows/actions/setup-node
      - run: echo "Main API Tests"
      - uses: ./.github/workflows/actions/run-npm-cmd
        with:
          script: start
      - uses: ./.github/workflows/actions/run-npm-cmd
        with:
          script: test:api
      - uses: ./.github/workflows/actions/run-npm-cmd
        with:
          script: stop

  main_smoke_tests:
    needs: main_integration_tests
    runs-on: ubuntu-latest
    environment:
      name: main
      deployment: false
    steps:
      - uses: actions/checkout@v4
      - run: echo "Main Smoke Tests"

  main_system_tests:
    needs: main_smoke_tests
    runs-on: ubuntu-latest
    environment:
      name: main
      deployment: false
    steps:
      - uses: actions/checkout@v4
      - run: echo "Main System Tests"

  main_e2e_tests:
    needs: main_system_tests
    runs-on: ubuntu-latest
    environment:
      name: main
      deployment: false
    steps:
      - uses: actions/checkout@v4
      - run: echo "Main E2E Tests"

  main_deploy:
    needs: main_e2e_tests
    runs-on: ubuntu-latest
    environment:
      name: main
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
      - run: echo "Main Deploy"

  main_sanity_check:
    needs: main_deploy
    runs-on: ubuntu-latest
    environment:
      name: main
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: ./.github/workflows/actions/setup-node
      - run: echo "Production checks running"
