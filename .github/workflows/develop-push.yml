name: Develop
on:
  push:
    branches:
      - develop
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

#post-merge-develop
jobs:
  dev_smoke_tests:
    runs-on: ubuntu-latest
     environment:  develop
     deployment: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
      - run: echo "Develop Smoke Tests"

  dev_sanity_check:
    needs: dev_smoke_tests
    runs-on: ubuntu-latest
     environment:  develop
     deployment: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
      - run: echo "Develop Sanity Check"
