
name: Bugfix PR
on:
  pull_request:
    branches:
      - develop
    types: [opened, synchronize, reopened]

env:
  IS_BUGFIX: ${{ startsWith(github.head_ref, 'bugfix/') }}

jobs:
  test_bugfix:
    if: env.IS_BUGFIX == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "Running PR for bugfix/*"
