name: Bugfix PR
on:
  pull_request:
    branches:
      - release/*
      - develop
    types: [opened, synchronize, reopened]

jobs:
  call-guard:
    uses: ./.github/workflows/guard.yml

  is_bugfix_pr:
    needs: call-guard
    if: needs.call-guard.outputs.IS_BUGFIX == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "Running PR workflow for bugfix/*"

  bugfix_linter_check_pr:
    needs: is_bugfix_pr
    uses: ./.github/workflows/lint.yml

  bugfix_unit_tests_pr:
    needs: bugfix_linter_check_pr
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/workflows/actions/setup-node
      - run: echo "Bugfix PR Unit Tests"
      - uses: ./.github/workflows/actions/run-npm-cmd
        with:
          script: test:unit

  bugfix_integration_tests_pr:
    needs: bugfix_unit_tests_pr
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "Bugfix PR Integration Tests"
