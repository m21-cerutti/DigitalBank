name: Install python and chromedriver
description: Run an npm script in a working directory
inputs:
  python-version:
    description: 'Python version to install'
    required: false
    default: '24'

runs:
  using: 'composite'
  steps:
    - name: Run npm ${{ inputs.script }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npm run ${{ inputs.script }}
    - uses: actions/setup-python@v6
      with:
        python-version: '3.13'
    - uses: actions/cache@v4
      id: cache-pip
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirement.txt') }}
    - name: Install Chrome
      shell: bash
      run: |
        wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        sudo mkdir -p /etc/apt/sources.list.d
        sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
        sudo apt-get update
        sudo apt-get -y install google-chrome-stable
    - name: Install ChromeDriver
      shell: bash
      run: |
        # Using specific ChromeDriver version for Chrome I used 132
        CHROMEDRIVER_VERSION="132.0.6834.83"
        echo "Installing ChromeDriver version: $CHROMEDRIVER_VERSION"
        wget -q "https://edgedl.me.gvt1.com/edgedl/chrome/chrome-for-testing/$CHROMEDRIVER_VERSION/linux64/chromedriver-linux64.zip"
        unzip chromedriver-linux64.zip
        chmod +x chromedriver-linux64/chromedriver
        sudo mv chromedriver-linux64/chromedriver /usr/local/bin/
