
name: Develop PR
on:
  pull_request:
    branches:
      - release
    types: [opened, synchronize, reopened]

jobs:
  call-guard:
    uses: ./.github/workflows/guard.yml

  test_develop:
    needs: call-guard
    if: needs.call-guard.outputs.IS_DEVELOP == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "Running PR workflow for develop/*"
